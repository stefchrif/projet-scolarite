# ====================================================================
# Profil PROD - MySQL (ex: base MySQL o2switch ou autre)
# Active avec : java -jar app.jar --spring.profiles.active=prod
# Renseigner les variables d'environnement DB_URL, DB_USER, DB_PASSWORD
# ====================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scolaritedb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

spring.h2.console.enabled=false
