# ====================================================================
# Profil par defaut = DEV (base H2 en memoire, aucune installation requise)
# Pour la prod MySQL : lancer avec --spring.profiles.active=prod
# ====================================================================
spring.application.name=scolarite

# --- Base de donnees H2 (en memoire) ---
spring.datasource.url=jdbc:h2:mem:scolaritedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Serveur ---
server.port=8080

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JWT (cle a changer en prod, via variable d'environnement) ---
app.jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLXNlY3JldC1rZXktZm9yLXNjb2xhcml0ZS1hcHAtMjAyNi1taW5pbXVtLTI1Ni1iaXRz}
app.jwt.expiration-ms=86400000
